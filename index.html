<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="app.css">
    <title>IMAGE SLIDER PROJECT</title>
</head>
<body>
    <div class="container">
        <div class="slides">
            <img class="slide" src="superman.webp" alt="Image 1">
            <img class="slide" src="batman.webp" alt="Image 2">
            <img class="slide" src="spider-man.jpg" alt="Image 3">
            <img class="slide" src="wonderwoman.jpg" alt="Image 4">
        </div>
        <button id="prev" onclick="prevSlide()">&#10094</button>
        <button id="next" onclick="nextSlide()">&#10095</button>
    </div>

    

    <script src="app.js"></script>
</body>
</html>
