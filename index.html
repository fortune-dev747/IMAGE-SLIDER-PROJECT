<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="app.css">
    <title>IMAGE SLIDER PROJECT</title>
</head>
<body>
    <!-- MODAL POPUP -->
      <div id="myModal" class="modal">
            <div class="modal-content">
                <h2>Welcome!</h2>
                <p>ENJOY THE SLIDESHOW. Thanks!</p>
                <button id="closeModalBtn" type="button" onclick="closePopup()">Close</button>
            </div>
       </div>
    <div class="container">
        <h1>IMAGE SLIDER</h1>
        <h2>MY MOUNT RUSHMORE OF SUPERHEROES</h2>
        <div class="slides">
            <img class="slide" src="superman.webp" alt="Image 1">
            <img class="slide" src="batman.webp" alt="Image 2">
            <img class="slide" src="spider-man.jpg" alt="Image 3">
            <img class="slide" src="wonderwoman.jpg" alt="Image 4">
        </div>
        <button id="prev" onclick="prevSlide()">&#10094</button>
        <button id="next" onclick="nextSlide()">&#10095</button>
        <div>
            <footer class="footer">
               <p>&copy; 2026 Fortune U. Emmanuel. All rights reserved.</p>
          </footer>
        </div>
    </div>

    

    <script src="app.js"></script>
</body>
</html>
